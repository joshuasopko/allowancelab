[variables]
    UPLOAD_MAX_FILESIZE = '20M'
    POST_MAX_SIZE = '25M'

[phases.setup]
    nixPkgs = ["php82Extensions.gmp", "php82Extensions.bcmath"]
    cmds = ['UPLOAD_INI_PATH=$(find /nix/store/*-php-*/lib -name php.ini | rev | cut -c 9- | rev)/upload.ini; echo "upload_max_filesize=${UPLOAD_MAX_FILESIZE};" >> $UPLOAD_INI_PATH; echo "post_max_size=${POST_MAX_SIZE};" >> $UPLOAD_INI_PATH; echo "extension=gmp" >> $UPLOAD_INI_PATH; echo "extension=bcmath" >> $UPLOAD_INI_PATH']
